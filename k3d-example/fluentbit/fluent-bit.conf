[SERVICE]
    Flush        1
    Log_Level    info
    Parsers_File /fluent-bit/etc/parsers.conf

[INPUT]
    Name              tail
    DB                /var/lib/fluent-bit/tail-db
    DB.locking        true
    Path              /var/log/pods/*/*/*.log
    Parser            cri
    Tag               kube.<pod_id>.<namespace_name>.<pod_name>.<container_name>
    # k3d log paths match the production regex
    Tag_Regex         /var/log/pods/(?<namespace_name>[^_/]+)_(?<pod_name>[^_/]+)_(?<pod_id>[^_/]+)/(?<container_name>[^/]+)/.*
    # avoid potential infinite logging
    Exclude_Path      /var/log/pods/*/fluent-bit/*.log
    Read_from_Head    On
    Skip_Long_Lines   On
    Refresh_Interval  5

# The CRI parser has Time_Keep On, producing a 'time' record field (nanosecond string).
# Both compact compressions convert 'time' to native Timestamp(ns) during Arrow/Parquet write.
[FILTER]
    Name     modify
    Match    kube.*
    Add      cluster ${CLUSTER_NAME}

# --- CI failure detection (moved from logs-server to the pipeline) ---
# Detect turborepo task failures on stderr.
# rewrite_tag copies matching records to a new tag for low-latency output.
# The original record continues through to bulk storage outputs unchanged.
# Two rules: hard error and soft error (--continue flag).
# Only stderr carries the canonical error signal from turborepo.
[FILTER]
    Name          rewrite_tag
    Match         kube.*
    Rule          $message ^.+command finished with error ci_failure false
    Emitter_Name  ci_failure_emitter

# Add context from the original kube tag to ci_failure records.
# The original tag segments are lost after rewrite, but the record
# already has 'cluster' from the modify filter above.
[FILTER]
    Name     modify
    Match    ci_failure
    Add      detection ci_task_failure

# --- Low-latency output for CI failures ---
# Separate S3 prefix for failures — small files, fast upload.
# In production this would be a webhook or Slack output.
[OUTPUT]
    Name                         s3
    Alias                        s3-ci-failures
    Match                        ci_failure
    bucket                       fluentbit-logs
    endpoint                     http://versitygw:7070
    tls                          Off
    use_put_object               On
    compression                  arrow-compact
    json_date_key                false
    total_file_size              256K
    upload_timeout               5s
    s3_key_format                /ci-failures/%Y/%m/%d/%H/%M/$UUID.arrow

# For debugging: also log CI failures to stdout
[OUTPUT]
    Name                         stdout
    Alias                        ci-failures-debug
    Match                        ci_failure
    Format                       json_lines

# --- Bulk storage outputs (high latency to reduce GCS operations cost) ---
# Arrow-compact: CRI 'time' as Timestamp(ns), stream+logtag dictionary-encoded
# json_date_key=false suppresses the internal timestamp
[OUTPUT]
    Name                         s3
    Alias                        s3-arrow
    Match                        kube.*
    bucket                       fluentbit-logs
    endpoint                     http://versitygw:7070
    tls                          Off
    use_put_object               On
    compression                  arrow-compact
    json_date_key                false
    total_file_size              1M
    upload_timeout               15s
    s3_key_format_tag_delimiters .
    s3_key_format                /${CLUSTER_NAME}/$TAG[2]/%Y/%m/%d/${NODE_NAME}/$TAG[3]/$TAG[4]/%H/%M/$UUID.arrow

# Parquet-compact: CRI 'time' as TIMESTAMP(isAdjustedToUTC, NANOS), stream+logtag dictionary-encoded
# json_date_key=false suppresses the internal timestamp
[OUTPUT]
    Name                         s3
    Alias                        s3-parquet
    Match                        kube.*
    bucket                       fluentbit-logs
    endpoint                     http://versitygw:7070
    tls                          Off
    use_put_object               On
    compression                  parquet-compact
    json_date_key                false
    total_file_size              1M
    upload_timeout               15s
    s3_key_format_tag_delimiters .
    # Ideally s3_key_format would use hive-style paths (/namespace=$TAG[2]/pod=$TAG[3]/...)
    # but Fluent Bit's uri_encode() in src/flb_signv4.c excludes '=' from percent-encoding,
    # while the SigV4 spec requires it (%3D). versitygw (fixed in #807) encodes correctly,
    # causing SignatureDoesNotMatch. Using positional dirs as a workaround;
    # Consumers must reconstruct namespace/pod/container columns from the file path at query time.
    s3_key_format                /${CLUSTER_NAME}/$TAG[2]/%Y/%m/%d/${NODE_NAME}/$TAG[3]/$TAG[4]/%H/%M/$UUID.parquet
